services:
  ad-sql:
    build:
      context: .
    image: ad-sql:local
    container_name: ad-sql
    restart: unless-stopped
    ports:
      - "${PORT:-5173}:5173"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5173
      DATA_DIR: /app/data
      SIF_COLLECTOR_DISABLED: "true"
    volumes:
      - ad_sql_data:/app/data

volumes:
  ad_sql_data:
